<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What I've Done Collector Options</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #f5f4ef;
        color: #1f2a37;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px;
        background: #fffdf8;
        border: 1px solid #d6d0c3;
        border-radius: 16px;
      }

      h1 {
        margin-top: 0;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      input {
        margin: 8px 0 16px;
        padding: 10px 12px;
        border: 1px solid #b4aa96;
        border-radius: 10px;
        font-size: 14px;
      }

      button {
        padding: 12px 14px;
        border: 0;
        border-radius: 10px;
        background: #1f6f5f;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      p {
        line-height: 1.5;
      }

      #status {
        margin-top: 12px;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Collector Options</h1>
      <p>Set the local ingest endpoint used by the extension.</p>
      <label for="endpoint">Ingest endpoint</label>
      <input id="endpoint" type="url" placeholder="http://127.0.0.1:4318/events" />
      <button id="save" type="button">Save</button>
      <div id="status"></div>
    </main>
    <script src="options.js"></script>
  </body>
</html>
