name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - master
      - "release/**"
      - "codex/**"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -- --pretty false

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: CLI alias smoke
        run: |
          npm link
          WID_BIN="$(npm prefix -g)/bin/wid"
          "${WID_BIN}" --help
          "${WID_BIN}" config --help
          "${WID_BIN}" tools --help

      - name: Domain pack fixture regression
        shell: bash
        run: |
          set -euo pipefail
          for fixture in fixtures/domain-packs/*.ndjson; do
            npm run dev -- domain-pack:test "${fixture}"
          done

      - name: Cluster benchmark regression
        run: npm run dev -- cluster:benchmark --json
